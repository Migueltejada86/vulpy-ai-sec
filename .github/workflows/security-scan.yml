name: Vulpy Security Scan

on:
  push:
    branches: [sca-cicd]
  pull_request:
    branches: 

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # <-- : no ;

    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install cyclonedx-bom semgrep crewai langchain-groq

    - run: cyclonedx-py venv -o vulpy-sbom.json

    - name: Run Vulpy AI Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}  # <-- GROQ no GROO
      run: python main.py || echo "Pipeline finished with errors. Continuing..."

    - name: Ensure Report Exists
      if: always()
      run: |
        if [ ! -f vulpy-report.md ]; then
          echo "# Vulpy AI Security Report" > vulpy-report.md
          echo "**Status**: ERROR - Pipeline failed" >> vulpy-report.md
          echo "**Timestamp**: $(date)" >> vulpy-report.md
        fi
        cat vulpy-report.md

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vulpy-report
        path: vulpy-report.md

    - name: Comment PR
      if: github.event_name == 'pull_request' && always()
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: vulpy-report.md

    - name: Security Gate
      run: |
        if [ -f vulpy-report.md ] && grep -qi "FAIL\|Critical\|High\|ERROR" vulpy-report.md; then
          echo "::error::Security gate FAILED"
          exit 1
        fi