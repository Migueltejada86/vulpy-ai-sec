name: Vulpy AI Security Scan
on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'cyclonedx-bom==0.12.0'

      - name: 1. Generate Python SBOM
        run: cyclonedx-py requirements -r requirements.txt -o vulpy-sbom.json

      - name: 2. SAST + SCA con Vulpy CrewAI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number || 0 }}
          python main.py $PR_NUM > vulpy-report.md || true

      - name: 3. Post PR Comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: vulpy-report.md

      - name: 4. Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: vulpy-sbom.json
          retention-days: 30

      - name: 5. Upload Vulpy Report
        uses: actions/upload-artifact@v4
        with:
          name: vulpy-report
          path: vulpy-report.md
          retention-days: 30